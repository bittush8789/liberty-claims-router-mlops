name: MLOps Training & Deployment Pipeline

on:
  push:
    branches: [ acicd ]
  pull_request:
    branches: [ acicd ]

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pipeline (Data Ingestion, Validation, scaling and training)
      run: |
        python train.py

    - name: DVC Track & Push
      run: |
        # Initialize mock DVC configuration for CI
        dvc init --no-scm -f
        dvc remote add -d myremote s3://diabetes-model-bucket/models
        # Track models
        dvc add models/diabetes_model.pkl
        # We would run 'dvc push' with S3 credentials in production
        echo "DVC tracking finalized"

    - name: Update KServe configurations & Commit
      run: |
        git config --global user.name "GitHub Actions CI"
        git config --global user.email "ci@github-actions.local"
        
        # Modify dummy comment or tag in k8s/inference.yaml to trigger GitOps sync
        echo "# Last update: $(date)" >> k8s/inference.yaml
        
        git add k8s/inference.yaml models/diabetes_model.pkl.dvc metrics.json validation_report.yaml
        git commit -m "Auto-update deployed model artifacts [skip ci]" || echo "No changes to commit"
        
        # Git push back to remote (using authentication tokens in production)
        # git push origin acicd
