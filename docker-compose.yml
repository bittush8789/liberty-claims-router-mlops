version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fnol_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: fnol_claims
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fnol_claims"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: fnol_api
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/fnol_claims
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./data:/app/data

volumes:
  postgres_data:
